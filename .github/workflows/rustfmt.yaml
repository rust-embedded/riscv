on:
  push:
    branches: [ master ]
    paths-ignore:
      - "**/*.md"
      - "README*"
      - "LICENSE*"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "README*"
      - "LICENSE*"
  merge_group:
    paths-ignore:
      - "**/*.md"
      - "README*"
      - "LICENSE*"

name: Code formatting check

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Run Rustfmt
        run: cargo fmt --all -- --check --verbose
